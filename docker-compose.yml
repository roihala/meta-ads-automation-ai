services:
  postgres:
    image: postgres:16
    container_name: campaigner-postgres
    environment:
      POSTGRES_DB: campaigner_dev
      POSTGRES_USER: campaigner
      POSTGRES_PASSWORD: campaigner_dev_pass
    ports:
      # Host port 5433 → container 5432. 5432 is used by aiweon-service's postgres.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaigner -d campaigner_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: campaigner-mongo
    environment:
      MONGO_INITDB_DATABASE: campaigner_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      # mongosh JS bundle takes 3–5s to boot; 5s timeout was too tight and
      # marked the container unhealthy even though mongo itself was fine.
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: campaigner-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  campaigner:
    build:
      context: .
      dockerfile: dockerfiles/agent.dockerfile
    image: campaigner:local
    container_name: campaigner
    env_file: .env
    volumes:
      - .:/app
      - ${APPDATA:-${HOME}/.config}/gcloud:/root/.config/gcloud:ro
    environment:
      PYTHONPATH: /app
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: campaigner_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: bash

  web:
    image: node:22-alpine
    container_name: campaigner-web
    working_dir: /app
    env_file: .env
    environment:
      WEB_DB_MODE: local-postgres
      WEB_AUTH_MODE: dev-cookie
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Always-on in dev — gates /runs deep-dive sections (web/src/lib/debug.ts).
      # Pinned here so it's set even if .env is missing the entry.
      DEBUG: "true"
      # next build OOMs on this Windows/Docker setup with default Node heap.
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Windows bind mounts don't propagate inotify events into the container,
      # so Next.js HMR misses file changes. Polling fixes that.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      # Host 3100 → container 3000. Host 3000 clashes with sibling Next.js dev
      # servers on this machine (e.g. aiweon-service); pin Campaigner web to 3100.
      - "3100:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
      # Mount docker socket so /api/runners/trigger can `docker exec campaigner …`
      # for the local "Run now" buttons. Dev-only; production uses cron.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    # apk add docker-cli (for runner-trigger API) and ffmpeg (for the upload
    # transcoding pipeline — see web/src/lib/transcode.ts) on boot.
    # Production build for fast page loads. Dev mode (`pnpm dev`) on this Windows
    # + Docker + 1173-module setup takes 15+ min per route to compile, which is
    # unusable. To re-enable HMR for active frontend dev, swap the tail back to
    # `pnpm dev`.
    command: sh -c "apk add --no-cache docker-cli ffmpeg >/dev/null 2>&1 && corepack enable && corepack prepare pnpm@9.12.0 --activate && pnpm install && pnpm build && pnpm start"
    profiles: ["web"]

volumes:
  pgdata:
  mongodata:
  redisdata:
  web_node_modules:
  web_next:
