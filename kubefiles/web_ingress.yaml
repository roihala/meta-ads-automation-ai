# Public dashboard at https://campaigner.aiweon.co.il
#
# Prerequisites (run once via Makefile):
#   make static_ip       — reserves a global static IP `campaigner-web-ip`
#   (DNS) point campaigner.aiweon.co.il → that IP at the registrar
#
# The ManagedCertificate provisions automatically once DNS resolves; this can
# take 15-60 min. Check with: kubectl describe managedcertificate -n campaigner
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: campaigner-web-cert-v2
  namespace: campaigner
spec:
  domains:
    - campaigner.aiweon.co.il
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: campaigner-web-frontend
  namespace: campaigner
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: campaigner
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: campaigner-web-ip
    networking.gke.io/managed-certificates: campaigner-web-cert-v2
    networking.gke.io/v1beta1.FrontendConfig: campaigner-web-frontend
spec:
  rules:
    - host: campaigner.aiweon.co.il
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
