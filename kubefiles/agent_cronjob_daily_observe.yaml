# Flow A — daily observe-propose. 09:00 Asia/Jerusalem.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agent-daily-observe
  namespace: campaigner
spec:
  schedule: "0 9 * * *"
  timeZone: "Asia/Jerusalem"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: agent
              image: us-central1-docker.pkg.dev/bemtech-478413/generic-agent-repo/campaigner-agent:latest
              imagePullPolicy: Always
              command: ["bash", "runners/daily_observe_propose.sh"]
              envFrom:
                - secretRef:
                    name: campaigner-secrets
              env:
                - name: GCP_PROJECT_ID
                  value: "bemtech-478413"
                - name: GCP_LOCATION
                  value: "us-central1"
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: "/var/secrets/gcp/credentials.json"
              volumeMounts:
                - name: gcp-credentials
                  mountPath: /var/secrets/gcp
                  readOnly: true
              resources:
                requests: { cpu: 200m, memory: 512Mi }
                limits: { cpu: 1000m, memory: 1536Mi }
          volumes:
            - name: gcp-credentials
              secret:
                secretName: gcp-vertexai-credentials
