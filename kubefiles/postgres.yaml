# In-cluster Postgres for the Campaigner namespace.
# Used by both the web Next.js app (pg Pool) and the agent CronJobs (psycopg).
# Single replica + 10Gi PVC — sufficient for MVP single-business workload.
# Connection string in campaigner-secrets `DATABASE_URL` must match user/db/password below.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: campaigner
type: Opaque
stringData:
  POSTGRES_USER: campaigner
  POSTGRES_DB: campaigner_dev
  POSTGRES_PASSWORD: campaigner_dev_pass
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: campaigner
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: campaigner
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            # postgres:16-alpine writes to /var/lib/postgresql/data which is the volume mount.
            # PGDATA subpath avoids "lost+found" on PVC root tripping initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "campaigner", "-d", "campaigner_dev"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "campaigner", "-d", "campaigner_dev"]
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
