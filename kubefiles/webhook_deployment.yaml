apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  namespace: campaigner
spec:
  # Trello pipe webhook — not part of MVP scope. Scale up to 1 once
  # WEBHOOK_VERIFY_TOKEN and TRELLO_* env vars are populated in campaigner-secrets.
  replicas: 0
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
    spec:
      containers:
        - name: webhook
          image: us-central1-docker.pkg.dev/bemtech-478413/generic-agent-repo/campaigner-webhook:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          envFrom:
            - secretRef:
                name: campaigner-secrets
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 200m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: webhook
  namespace: campaigner
spec:
  selector:
    app: webhook
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
