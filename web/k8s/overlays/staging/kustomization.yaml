apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: campaigner-staging
resources:
  - ../../base
patches:
  - path: patch-configmap.yaml
    target: { kind: ConfigMap, name: campaigner-web-config }
  - path: patch-ingress.yaml
    target: { kind: Ingress, name: campaigner-web }
images:
  - name: us-central1-docker.pkg.dev/bemtech-478413/generic-agent-repo/campaigner-web
    newTag: staging
