# Example only — real Secret is provisioned via External Secrets Operator or sealed-secrets.
# Keys the three runners expect at runtime:
#   BUSINESS_ID                     (required — target business uuid)
#   ANTHROPIC_API_KEY               (required — for claude -p)
#   DATABASE_URL                    (required when WEB_DB_MODE=local-postgres; runners use the same DB)
#   SUPABASE_URL                    (required when remote mode — heartbeat / tools)
#   SUPABASE_SERVICE_ROLE_KEY       (required when remote mode)
#   META_APP_ID / META_APP_SECRET / META_ACCESS_TOKEN / META_AD_ACCOUNT_ID / META_PAGE_ID
#                                   (required — facebook-business SDK)
#
# GCP creds (for Imagen in weekly-creative-firehose) should come from Workload
# Identity on the runner service account, not from this Secret.
apiVersion: v1
kind: Secret
metadata:
  name: campaigner-runner-secrets
type: Opaque
stringData:
  BUSINESS_ID: "REPLACE-UUID"
  ANTHROPIC_API_KEY: "sk-ant-REPLACE"
  DATABASE_URL: "postgresql://REPLACE:REPLACE@REPLACE:5432/REPLACE"
  SUPABASE_URL: ""
  SUPABASE_SERVICE_ROLE_KEY: ""
  META_APP_ID: "REPLACE"
  META_APP_SECRET: "REPLACE"
  META_ACCESS_TOKEN: "REPLACE"
  META_AD_ACCOUNT_ID: "act_REPLACE"
  META_PAGE_ID: "REPLACE"
