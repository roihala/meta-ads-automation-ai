# Three CronJobs that drive the campaigner automation loop.
# Schedule source: docs/plans/campaigner-spec.md §18.1.
#
# The image bundles Python + Claude CLI + campaigner/ code (built from the
# root Dockerfile). Runners write heartbeat rows at start/end/error so the
# dashboard can surface liveness.
#
# timeZone requires k8s >= 1.25; on older clusters, rewrite schedules to UTC
# (09:00 IL ≈ 06:00 or 07:00 UTC depending on DST).
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: campaigner-daily-observe-propose
  labels:
    app: campaigner-runner
    flow: daily-observe-propose
spec:
  schedule: "0 9 * * *"
  timeZone: "Asia/Jerusalem"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1200
      template:
        metadata:
          labels:
            app: campaigner-runner
            flow: daily-observe-propose
        spec:
          restartPolicy: Never
          containers:
            - name: runner
              image: us-central1-docker.pkg.dev/bemtech-478413/generic-agent-repo/campaigner-runner:latest
              imagePullPolicy: IfNotPresent
              command: ["bash", "runners/daily_observe_propose.sh"]
              envFrom:
                - configMapRef:
                    name: campaigner-runner-config
                - secretRef:
                    name: campaigner-runner-secrets
              resources:
                requests: { cpu: 200m, memory: 512Mi }
                limits: { cpu: 1000m, memory: 1Gi }
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: false
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: campaigner-execute-approvals
  labels:
    app: campaigner-runner
    flow: execute-approvals
spec:
  schedule: "*/15 * * * *"
  timeZone: "Asia/Jerusalem"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: campaigner-runner
            flow: execute-approvals
        spec:
          restartPolicy: Never
          containers:
            - name: runner
              image: us-central1-docker.pkg.dev/bemtech-478413/generic-agent-repo/campaigner-runner:latest
              imagePullPolicy: IfNotPresent
              command: ["bash", "runners/execute_approvals.sh"]
              envFrom:
                - configMapRef:
                    name: campaigner-runner-config
                - secretRef:
                    name: campaigner-runner-secrets
              resources:
                requests: { cpu: 200m, memory: 384Mi }
                limits: { cpu: 500m, memory: 768Mi }
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: false
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: campaigner-weekly-creative-firehose
  labels:
    app: campaigner-runner
    flow: weekly-creative-firehose
spec:
  schedule: "0 10 * * 1"
  timeZone: "Asia/Jerusalem"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: campaigner-runner
            flow: weekly-creative-firehose
        spec:
          restartPolicy: Never
          containers:
            - name: runner
              image: us-central1-docker.pkg.dev/bemtech-478413/generic-agent-repo/campaigner-runner:latest
              imagePullPolicy: IfNotPresent
              command: ["bash", "runners/weekly_creative_firehose.sh"]
              envFrom:
                - configMapRef:
                    name: campaigner-runner-config
                - secretRef:
                    name: campaigner-runner-secrets
              resources:
                requests: { cpu: 300m, memory: 512Mi }
                limits: { cpu: 1000m, memory: 1Gi }
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: false
