apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaigner-web
  labels:
    app: campaigner-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campaigner-web
  template:
    metadata:
      labels:
        app: campaigner-web
    spec:
      containers:
        - name: web
          image: us-central1-docker.pkg.dev/bemtech-478413/generic-agent-repo/campaigner-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - configMapRef:
                name: campaigner-web-config
            - secretRef:
                name: campaigner-web-secrets
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: false
