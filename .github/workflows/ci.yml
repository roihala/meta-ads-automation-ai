# CI — lint + test on every push and PR.
# Separate from deploy.yml (which deploys on push-to-main).
# Both can run on the same push; deploy is gated on its own conditions.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.changes.outputs.python }}
      web: ${{ steps.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            python:
              - 'campaigner/**'
              - 'runners/**'
              - 'scripts/**'
              - 'tests/**'
              - 'webhook/**'
              - 'meta_ads_manager.py'
              - 'image_generator.py'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
            web:
              - 'web/**'

  python-lint:
    name: Python — lint (ruff)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install ruff
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  python-test:
    name: Python — pytest
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: campaigner_test
          POSTGRES_USER: campaigner
          POSTGRES_PASSWORD: campaigner_test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://campaigner:campaigner_test_pass@localhost:5432/campaigner_test
      BUSINESS_ID: 00000000-0000-0000-0000-000000000001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Apply migrations
        run: python scripts/migrate.py
      - name: Run pytest
        run: pytest -v

  web-typecheck:
    name: Web — typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  web-lint:
    name: Web — eslint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec next lint

  web-test:
    name: Web — vitest
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm test --run

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [python-lint, python-test, web-typecheck, web-lint, web-test]
    if: always()
    steps:
      - name: All required checks
        env:
          PY_LINT: ${{ needs.python-lint.result }}
          PY_TEST: ${{ needs.python-test.result }}
          WEB_TC: ${{ needs.web-typecheck.result }}
          WEB_LINT: ${{ needs.web-lint.result }}
          WEB_TEST: ${{ needs.web-test.result }}
        run: |
          {
            echo "## CI Results"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| python-lint | ${PY_LINT} |"
            echo "| python-test | ${PY_TEST} |"
            echo "| web-typecheck | ${WEB_TC} |"
            echo "| web-lint | ${WEB_LINT} |"
            echo "| web-test | ${WEB_TEST} |"
          } >> "$GITHUB_STEP_SUMMARY"
          # Fail if any check failed (skipped is OK — paths-filter)
          for r in "$PY_LINT" "$PY_TEST" "$WEB_TC" "$WEB_LINT" "$WEB_TEST"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              exit 1
            fi
          done
